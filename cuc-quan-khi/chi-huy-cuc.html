<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ban Chỉ Huy Cục</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            background-color: #fcfcfc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Khung chứa danh sách theo khổ dọc */
        .leader-container {
            display: flex;
            flex-direction: column;
            gap: 30px; /* Khoảng cách giữa các nhân sự */
            max-width: 400px;
            width: 100%;
        }

        /* Thẻ bao quanh từng nhân sự */
        .leader-card {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            text-align: center;
            padding: 20px;
            border: 1px solid #e0e0e0;
            transition: transform 0.2s;
        }

        .leader-card:hover {
            transform: translateY(-2px); /* Hiệu ứng nổi nhẹ khi di chuột */
        }

        /* Khung bo góc cho ảnh chân dung */
        .avatar-box {
            width: 180px;
            height: 240px; /* Tỉ lệ chuẩn 3:4 cho ảnh thẻ/chân dung */
            margin: 0 auto 15px auto;
            border-radius: 6px;
            overflow: hidden;
            background-color: #f0f0f0; /* Màu nền mồi nếu chưa có ảnh */
            border: 1px solid #ddd;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Giúp ảnh không bị méo khi co giãn */
            display: block;
        }

        /* Định dạng chức vụ */
        .chucvu {
            font-size: 14px;
            text-transform: uppercase;
            color: #b71c1c; /* Màu đỏ thẫm trang trọng */
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        /* Định dạng cấp bậc */
        .capbac {
            font-size: 14px;
            color: #555; /* Màu xám lịch sự cho cấp bậc */
            font-style: italic;
            margin: 0 0 6px 0;
        }

        /* Định dạng họ tên */
        .hoten {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="leader-container">
        <h1 style="text-align: center;">Chỉ huy Cục Quân khí</h1>

        <!-- 1. CỤC TRƯỞNG -->
        <div class="leader-card">
            <div class="avatar-box">
                <img src="chi-huy-cuc/1.jpg">
            </div>
            <div class="chucvu">Cục trưởng</div>
            <p class="capbac">Thiếu tướng</p> 
            <p class="hoten">Hoàng Đạo Nhật Yên</p>
        </div>

        <!-- 2. BÍ THƯ ĐẢNG ỦY CỤC -->
        <div class="leader-card">
            <div class="avatar-box">
            <img src="chi-huy-cuc/2.jpg">
            </div>
            <div class="chucvu">BTĐU, Phó Cục trưởng</div>
            <p class="capbac">Đại tá</p>
            <p class="hoten">Hà Đình Điệp</p>
        </div>

 	<!-- 3. PHÓ CỤC TRƯỞNG -->
        <div class="leader-card">
            <div class="avatar-box">
            <img src="chi-huy-cuc/3.jpg">
            </div>
            <div class="chucvu">Phó Cục trưởng</div>
            <p class="capbac">Đại tá</p>
            <p class="hoten">Lê Mạnh Cường</p>
        </div>

 	<!-- 4. PHÓ CỤC TRƯỞNG -->
        <div class="leader-card">
            <div class="avatar-box">
            <img src="chi-huy-cuc/4.jpg">
            </div>
            <div class="chucvu">Phó Cục trưởng</div>
            <p class="capbac">Đại tá</p>
            <p class="hoten">Nguyễn Quang Lâm</p>
        </div>


 	<!-- 3. PHÓ CỤC TRƯỞNG -->
        <div class="leader-card">
            <div class="avatar-box">
            <img src="chi-huy-cuc/5.jpg">
            </div>
            <div class="chucvu>Phó Cục trưởng</div>
            <p class="capbac">Đại tá</p>
            <p class="hoten">Bùi Huy Ngọc</p>
        </div>
    </div>

</body>
</html>
